[build]
  command = "npm run build"
  publish = "dist"

# Cache settings
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# HTML files - no cache for AI crawlers
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"

# Allow all crawlers
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow, noarchive, max-snippet:-1, max-image-preview:large, max-video-preview:-1"

# Specific handling for API endpoints (if any)
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# Prevent crawl delay issues by being explicit
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=86400"

# Sitemap
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=86400"

# Redirects for SPA routing (if needed)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
